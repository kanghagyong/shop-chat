<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사용자 채팅</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
  h1 { font-size: 18px; }
  #identity { font-size: 13px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  #loginForm { display: flex; gap: 6px; margin-bottom: 12px; }
  #loginForm input { flex: 1; padding: 6px; }
  #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 8px; margin-bottom: 8px; }
  #messages > div { margin-bottom: 6px; white-space: pre-wrap; }
  .mine { text-align: right; color: #1a73e8; }
  .other { text-align: left; color: #333; }
  .translated { font-size: 12px; color: #888; font-style: italic; margin-top: 2px; }
  form { display: flex; gap: 8px; }
  #input { flex: 1; padding: 8px; font-family: inherit; resize: none; max-height: 100px; }
  button { padding: 8px 16px; }
  #inputHint { font-size: 11px; color: #999; margin-top: 2px; }
  #messages a { color: inherit; }
  #messages img { max-width: 240px; max-height: 240px; border-radius: 6px; display: block; }
</style>
</head>
<body>
  <h1>사용자 화면</h1>
  <div id="identity"></div>
  <form id="loginForm" style="display:none;">
    <input id="loginUsername" autocomplete="username" placeholder="아이디" />
    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="비밀번호" />
    <button type="submit">로그인</button>
  </form>
  <div id="messages"></div>
  <form id="form">
    <input id="imageInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none;" />
    <button id="attachBtn" type="button">📎</button>
    <textarea id="input" autocomplete="off" placeholder="메시지를 입력하세요" rows="1"></textarea>
    <button type="submit">전송</button>
  </form>
  <div id="inputHint">Shift+Enter로 줄바꿈, Enter로 전송</div>

  <script src="socket.io/socket.io.js"></script>
  <script>
    const ROLE = 'user';
    const BASE_PATH = location.pathname.replace(/[^/]*$/, '');
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const identity = document.getElementById('identity');
    const loginForm = document.getElementById('loginForm');
    const imageInput = document.getElementById('imageInput');
    const attachBtn = document.getElementById('attachBtn');

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function linkify(escapedText) {
      return escapedText.replace(/(https?:\/\/[^\s<]+)/g, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
    }

    function addMessage(sender, text, translatedText, messageType) {
      const wrapper = document.createElement('div');
      wrapper.className = sender === ROLE ? 'mine' : 'other';

      const original = document.createElement('div');
      if (messageType === 'image') {
        const link = document.createElement('a');
        link.href = `${BASE_PATH}${text}`;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        const img = document.createElement('img');
        img.src = `${BASE_PATH}${text}`;
        link.appendChild(img);
        original.appendChild(link);
      } else {
        original.innerHTML = linkify(escapeHtml(text));
      }
      wrapper.appendChild(original);

      if (sender !== ROLE && translatedText) {
        const translated = document.createElement('div');
        translated.className = 'translated';
        translated.innerHTML = linkify(escapeHtml(translatedText));
        wrapper.appendChild(translated);
      }

      messages.appendChild(wrapper);
      messages.scrollTop = messages.scrollHeight;
    }

    function getGuestId() {
      let guestId = localStorage.getItem('guestId');
      if (!guestId) {
        guestId = crypto.randomUUID();
        localStorage.setItem('guestId', guestId);
      }
      return guestId;
    }

    async function init() {
      const me = await fetch(`${BASE_PATH}api/me`).then((r) => r.json());

      if (me.loggedIn) {
        identity.innerHTML = `<span>[회원] ${me.username}</span><button id="logoutBtn">로그아웃</button>`;
        document.getElementById('logoutBtn').addEventListener('click', async () => {
          await fetch(`${BASE_PATH}api/logout`, { method: 'POST' });
          location.reload();
        });
      } else {
        const guestId = getGuestId();
        identity.innerHTML = `<span>[비회원] ${guestId.slice(0, 8)}</span>`;
        loginForm.style.display = 'flex';
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const username = document.getElementById('loginUsername').value.trim();
          const password = document.getElementById('loginPassword').value;
          const res = await fetch(`${BASE_PATH}api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          if (res.ok) {
            location.reload();
          } else {
            alert('로그인 실패');
          }
        });
      }

      const socket = io({ path: `${BASE_PATH}socket.io/`, query: { role: ROLE, guestId: getGuestId() } });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        socket.emit('send_message', { message: text });
        addMessage(ROLE, text);
        input.value = '';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      attachBtn.addEventListener('click', () => imageInput.click());

      imageInput.addEventListener('change', async () => {
        const file = imageInput.files[0];
        imageInput.value = '';
        if (!file) return;

        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch(`${BASE_PATH}api/upload`, { method: 'POST', body: formData });
        if (!res.ok) {
          alert('이미지 파일(jpg, png, gif, webp)만 업로드할 수 있습니다.');
          return;
        }
        const { url } = await res.json();
        socket.emit('send_message', { message: url, messageType: 'image' });
        addMessage(ROLE, url, null, 'image');
      });

      socket.on('chat_history', (history) => {
        history.forEach(({ sender, message, message_type, translated_text }) =>
          addMessage(sender, message, translated_text, message_type)
        );
      });

      socket.on('receive_message', ({ sender, message, message_type, translated_text }) => {
        addMessage(sender, message, translated_text, message_type);
      });
    }

    init();
  </script>
</body>
</html>
