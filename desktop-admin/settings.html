<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ShopChat Admin 설정</title>
<style>
  body { font-family: sans-serif; padding: 24px; }
  h2 { font-size: 16px; margin-top: 0; }
  label { display: block; margin-bottom: 4px; font-size: 13px; color: #333; }
  input { width: 100%; padding: 8px; margin-bottom: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
  <h2>초기 설정</h2>
  <form id="form">
    <label for="token">관리자 토큰</label>
    <input id="token" type="text" required />
    <label for="site">사이트 필터 (선택, 비워두면 전체 보기)</label>
    <input id="site" type="text" />
    <button type="submit">저장하고 시작</button>
  </form>
  <script>
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const token = document.getElementById('token').value.trim();
      const site = document.getElementById('site').value.trim();
      if (!token) return;
      window.settingsAPI.save({ token, site });
    });
  </script>
</body>
</html>
